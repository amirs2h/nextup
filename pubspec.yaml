name: nextup
description: "NextUp - Track your favorite shows and movies"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.7.2

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  # UI
  cupertino_icons: ^1.0.8
  google_fonts: ^6.2.1
  cached_network_image: ^3.4.1
  shimmer: ^3.0.0
  image_picker: ^1.1.2

  # State Management
  flutter_bloc: ^8.1.6
  equatable: ^2.0.8

  # Routing
  go_router: ^14.6.2

  # Network
  dio: ^5.7.0

  # Backend
  supabase_flutter: ^2.8.4

  # Local Storage
  shared_preferences: ^2.5.3

  # Utils
  intl: ^0.19.0
  share_plus: ^10.1.4
  url_launcher: ^6.2.0
  fl_chart: ^0.70.2
  timeago: ^3.7.0
  app_links: ^6.3.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0
  flutter_launcher_icons: ^0.14.2

flutter_launcher_icons:
  android: true
  ios: false
  image_path: "logo.png"
  adaptive_icon_background: "#0A0A0F"
  adaptive_icon_foreground: "logo.png"

flutter:
  uses-material-design: true
